<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZILEARN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">AZILEARN</h1>
        </header>
        
        <main class="main-content">
            <div class="search-container">
                <div class="search-box">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Search KCSE topics..." autocomplete="off" autofocus>
                </div>
                
                <div id="search-history" class="search-history hidden">
                    <!-- History items will be injected here -->
                </div>
            </div>

            <div id="results-container" class="results-container hidden">
                <div class="illustration">
                    <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5"></circle>
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" fill="rgba(255, 107, 0, 0.1)"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" fill="rgba(255, 107, 0, 0.1)"></path>
                        <path d="M12 7v14"></path>
                        <path d="M16 8h-2"></path>
                        <path d="M16 12h-2"></path>
                        <path d="M8 8h2"></path>
                        <path d="M8 12h2"></path>
                    </svg>
                </div>
                <h2 class="coming-soon-title">Content is on the way!</h2>
                <p class="coming-soon-text">We are currently preparing the study materials for <strong id="search-query-display"></strong>. Check back soon!</p>
            </div>
        </main>
    </div>

    <script type="module" src="/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
</body>
</html>
